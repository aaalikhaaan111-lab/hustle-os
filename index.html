<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>HUSTLE.OS — Преврати хобби в первый честный доход</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F5F6FB;
    --bg2:#EEF0F8;
    --card:#FFFFFF;
    --ink:#15151F;
    --ink-soft:#3A3A48;
    --muted:#6E6E7E;
    --faint:#9A9AAB;
    --line:#EAEBF2;
    --line2:#E0E2EC;
    --lime:#C7F23E;
    --lime-deep:#A9DC18;
    --lime-glow:rgba(199,242,62,.45);
    --violet:#6C4DF6;
    --violet-soft:#EEEAFE;
    --blue:#2F86FF;
    --blue-soft:#E4EFFF;
    --orange:#FF7A3D;
    --orange-soft:#FFEDE2;
    --green:#16A36A;
    --green-soft:#E2F6EC;
    --red:#E5484D;
    --red-soft:#FCEAEA;
    --yellow:#E8A23A;
    --yellow-soft:#FCF1DE;
    --r-sm:12px; --r:18px; --r-lg:24px; --r-xl:30px;
    --sh-1:0 1px 2px rgba(20,20,40,.04), 0 2px 8px rgba(20,20,40,.05);
    --sh-2:0 4px 14px rgba(20,20,40,.06), 0 12px 40px rgba(20,20,40,.07);
    --sh-3:0 18px 60px rgba(76,57,180,.18);
    --maxw:1080px;
    --display:'Unbounded',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--lime);color:var(--ink)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px}
  a{color:inherit}
  h1,h2,h3,h4{font-family:var(--display);line-height:1.08;letter-spacing:-.01em;font-weight:800}

  /* ===== Loading ===== */
  #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg);z-index:9999}
  #boot .logo{font-family:var(--display);font-weight:900;font-size:30px;letter-spacing:-.02em}
  #boot .logo b{background:var(--lime);padding:2px 8px;border-radius:8px}
  #boot .bar{width:140px;height:6px;border-radius:99px;background:var(--line2);overflow:hidden}
  #boot .bar i{display:block;height:100%;width:40%;border-radius:99px;background:var(--ink);animation:boot 1.1s ease-in-out infinite}
  @keyframes boot{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}

  /* ===== Layout helpers ===== */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .narrow{max-width:680px;margin:0 auto;padding:0 20px}
  .screen{min-height:100vh;padding:0 0 80px}
  .pad-top{padding-top:26px}
  .center{text-align:center}
  .row{display:flex;align-items:center;gap:12px}
  .col{display:flex;flex-direction:column}
  .gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}.gap24{gap:24px}
  .wrapf{flex-wrap:wrap}
  .grow{flex:1}
  .hide{display:none!important}
  .mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}.mt32{margin-top:32px}.mt40{margin-top:40px}
  .mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}

  .eyebrow{font-family:var(--display);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet)}
  .muted{color:var(--muted)}
  .faint{color:var(--faint)}
  .small{font-size:14px}
  .tiny{font-size:12.5px}

  /* ===== Buttons ===== */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--display);font-weight:700;font-size:16px;padding:15px 26px;border-radius:99px;background:var(--ink);color:#fff;transition:transform .12s ease, box-shadow .2s ease, background .2s ease;white-space:nowrap}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.lime{background:var(--lime);color:var(--ink);box-shadow:0 8px 22px var(--lime-glow)}
  .btn.lime:hover{box-shadow:0 12px 30px var(--lime-glow)}
  .btn.violet{background:var(--violet);color:#fff;box-shadow:0 8px 22px rgba(108,77,246,.32)}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line2)}
  .btn.ghost:hover{border-color:var(--ink)}
  .btn.sm{padding:11px 18px;font-size:14px}
  .btn.lg{padding:18px 34px;font-size:18px}
  .btn.block{display:flex;width:100%}
  .link{font-weight:600;color:var(--violet);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

  /* ===== Cards ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
  .card.pad{padding:24px}
  .card.pad-lg{padding:30px}
  .soft{border-radius:var(--r);padding:18px;background:var(--bg2);border:1px solid var(--line)}

  .chip{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:99px;border:1.5px solid var(--line2);background:#fff;font-weight:600;font-size:14.5px;transition:all .14s ease;user-select:none}
  .chip:hover{border-color:var(--ink)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.lime.on{background:var(--lime);color:var(--ink);border-color:var(--lime)}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:99px;font-weight:700;font-size:12px;letter-spacing:.01em}
  .pill.v{background:var(--violet-soft);color:var(--violet)}
  .pill.b{background:var(--blue-soft);color:var(--blue)}
  .pill.o{background:var(--orange-soft);color:#D9601F}
  .pill.g{background:var(--green-soft);color:var(--green)}
  .pill.r{background:var(--red-soft);color:var(--red)}
  .pill.y{background:var(--yellow-soft);color:#B57714}
  .pill.l{background:var(--lime);color:var(--ink)}

  .term{display:inline;color:var(--violet);font-weight:600;border-bottom:1.5px dashed var(--violet);cursor:pointer}
  .term:hover{background:var(--violet-soft);border-radius:4px}

  /* ===== Inputs ===== */
  .field label{display:block;font-weight:600;font-size:14.5px;margin-bottom:7px}
  .field input,.field textarea{width:100%;padding:14px 16px;border:1.5px solid var(--line2);border-radius:var(--r-sm);background:#fff;transition:border .14s ease, box-shadow .14s ease;color:var(--ink)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 4px var(--violet-soft)}
  .field textarea{resize:vertical;min-height:80px;line-height:1.5}

  .seg{display:flex;gap:10px}
  .seg .opt{flex:1;text-align:center;padding:14px;border:1.5px solid var(--line2);border-radius:var(--r-sm);font-weight:600;background:#fff;transition:all .14s ease}
  .seg .opt.on{border-color:var(--violet);background:var(--violet-soft);color:var(--violet)}

  /* ===== Progress ring / bar ===== */
  .pbar{height:12px;border-radius:99px;background:var(--line2);overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--lime),var(--lime-deep));transition:width .7s cubic-bezier(.2,.8,.2,1)}

  /* ===== Top bar ===== */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(245,246,251,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .topbar .inner{max-width:var(--maxw);margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:-.02em;cursor:pointer}
  .brand b{background:var(--lime);padding:1px 6px;border-radius:6px}
  .xpbadge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;background:var(--ink);color:#fff;font-family:var(--display);font-weight:700;font-size:13px}

  /* ===== Landing ===== */
  .hero{position:relative;padding:54px 0 30px;overflow:hidden}
  .hero .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5;z-index:0}
  .hero h1{font-size:clamp(44px,9vw,92px);font-weight:900;letter-spacing:-.04em;line-height:.92}
  .hero .lead{font-size:clamp(18px,2.4vw,23px);max-width:560px;color:var(--ink-soft);font-weight:500}
  .hero .badgeline{display:inline-flex;gap:7px;align-items:center;background:#fff;border:1px solid var(--line2);padding:7px 14px;border-radius:99px;font-weight:600;font-size:13.5px;box-shadow:var(--sh-1)}

  .vcards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .vcard{padding:22px;border-radius:var(--r);background:#fff;border:1px solid var(--line);box-shadow:var(--sh-1);transition:transform .15s ease, box-shadow .2s ease}
  .vcard:hover{transform:translateY(-4px);box-shadow:var(--sh-2)}
  .vcard .ico{font-size:30px;display:block;margin-bottom:10px}
  .vcard h4{font-size:16px}

  .getlist{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .getlist .g{display:flex;align-items:center;gap:11px;padding:15px 17px;background:#fff;border:1px solid var(--line);border-radius:var(--r);font-weight:600}
  .getlist .g .d{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--lime);font-size:16px}

  .mprev{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .mprevcard{padding:18px;border-radius:var(--r);background:#fff;border:1px solid var(--line);position:relative}
  .mprevcard .n{font-family:var(--display);font-weight:800;font-size:13px;color:var(--faint)}
  .mprevcard .e{font-size:26px;margin:6px 0}
  .mprevcard h4{font-size:14.5px}

  .why{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .why .w{padding:24px;border-radius:var(--r);background:var(--ink);color:#fff}
  .why .w .num{font-family:var(--display);font-weight:900;font-size:30px;color:var(--lime)}

  /* ===== Quest map ===== */
  .hub-head{background:linear-gradient(135deg,#1b1530,#241a44 60%,#2c2150);color:#fff;border-radius:var(--r-xl);padding:26px;position:relative;overflow:hidden}
  .hub-head .glow{position:absolute;width:240px;height:240px;border-radius:50%;background:var(--violet);filter:blur(80px);opacity:.5;top:-90px;right:-40px}
  .hub-head .glow2{position:absolute;width:200px;height:200px;border-radius:50%;background:var(--lime);filter:blur(80px);opacity:.25;bottom:-100px;left:-30px}
  .hub-head h2{font-size:26px;position:relative}
  .ringwrap{display:flex;align-items:center;gap:18px}
  .ring{position:relative;width:84px;height:84px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:19px;color:#fff}

  .badgestrip{display:flex;gap:8px;flex-wrap:wrap}
  .badge{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);position:relative}
  .badge.got{background:var(--lime);border-color:var(--lime)}
  .badge.lock{opacity:.4}

  .path{position:relative;margin-top:26px}
  .path .line{position:absolute;left:50%;top:0;bottom:0;width:3px;background:repeating-linear-gradient(to bottom,var(--line2) 0 9px,transparent 9px 18px);transform:translateX(-50%);z-index:0}
  .mnode{position:relative;z-index:1;display:flex;gap:18px;margin-bottom:18px;align-items:stretch}
  .mnode .dot{width:54px;height:54px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:24px;background:#fff;border:3px solid var(--line2);box-shadow:var(--sh-1);align-self:center}
  .mnode.active .dot{border-color:var(--violet);box-shadow:0 0 0 6px var(--violet-soft)}
  .mnode.done .dot{background:var(--lime);border-color:var(--lime)}
  .mcard{flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-1);transition:transform .14s ease, box-shadow .2s ease}
  .mnode.active .mcard{border-color:var(--violet);box-shadow:var(--sh-2)}
  .mnode.locked .mcard{opacity:.62;background:var(--bg2)}
  .mcard.click{cursor:pointer}
  .mcard.click:hover{transform:translateY(-3px);box-shadow:var(--sh-2)}
  .mcard h4{font-size:16px}
  .mcard .unlocks{font-size:12.5px;color:var(--muted);margin-top:7px}

  /* ===== Mission shell ===== */
  .mhead{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .mhead .badge-no{font-family:var(--display);font-weight:800;font-size:13px;padding:5px 11px;border-radius:99px;background:var(--ink);color:#fff}
  .stepper{display:flex;gap:7px;margin:16px 0 22px}
  .stepper .s{height:6px;border-radius:99px;flex:1;background:var(--line2)}
  .stepper .s.on{background:var(--violet)}
  .stepper .s.done{background:var(--lime)}

  .optcard{text-align:left;width:100%;padding:16px 18px;border:1.5px solid var(--line2);border-radius:var(--r);background:#fff;transition:all .14s ease;display:flex;gap:13px;align-items:flex-start}
  .optcard:hover{border-color:var(--ink);transform:translateY(-1px)}
  .optcard.on{border-color:var(--violet);background:var(--violet-soft)}
  .optcard .k{font-family:var(--display);font-weight:800;width:28px;height:28px;border-radius:9px;background:var(--bg2);display:grid;place-items:center;flex:none;font-size:14px}
  .optcard.on .k{background:var(--violet);color:#fff}

  .feedback{border-radius:var(--r);padding:18px;margin-top:16px;border:1px solid}
  .feedback.good{background:var(--green-soft);border-color:#BfeBD2}
  .feedback.warn{background:var(--yellow-soft);border-color:#F2DDB0}
  .feedback.bad{background:var(--red-soft);border-color:#F4CFcf}
  .feedback h4{font-size:15px;margin-bottom:5px}
  .feedback .takeaway{margin-top:11px;padding-top:11px;border-top:1px dashed rgba(0,0,0,.12);font-weight:600;font-size:14px}

  /* path / offer / pricing specifics get inline styles in JS where needed */

  .pathcard{border:1.5px solid var(--line2);border-radius:var(--r-lg);background:#fff;padding:20px;transition:all .15s ease;cursor:pointer;position:relative}
  .pathcard:hover{transform:translateY(-3px);box-shadow:var(--sh-2)}
  .pathcard.on{border-color:var(--violet);box-shadow:var(--sh-2)}
  .pathcard .match{font-family:var(--display);font-weight:900;font-size:22px;color:var(--violet)}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .statgrid .st{background:var(--bg2);border-radius:12px;padding:10px 12px}
  .statgrid .st .l{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .statgrid .st .v{font-weight:700;font-size:14px;margin-top:2px}

  .offerprev{background:linear-gradient(135deg,#241a44,#352765);color:#fff;border-radius:var(--r-lg);padding:26px;position:relative;overflow:hidden}
  .offerprev .tag{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--lime);opacity:.18;filter:blur(20px)}

  .gauge{height:16px;border-radius:99px;background:linear-gradient(90deg,var(--red) 0%,var(--yellow) 50%,var(--green) 100%);position:relative}
  .gauge .pin{position:absolute;top:-7px;width:6px;height:30px;border-radius:99px;background:var(--ink);transform:translateX(-50%);box-shadow:0 0 0 3px #fff;transition:left .5s ease}

  /* ===== Modal ===== */
  .ovl{position:fixed;inset:0;background:rgba(20,16,40,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .2s ease}
  @media(min-width:640px){.ovl{align-items:center;padding:20px}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:26px;max-height:88vh;overflow:auto;animation:rise .26s cubic-bezier(.2,.9,.2,1)}
  @media(min-width:640px){.modal{border-radius:24px}}
  @keyframes rise{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .modal .x{position:sticky;top:0;float:right;width:34px;height:34px;border-radius:50%;background:var(--bg2);display:grid;place-items:center;font-size:18px;font-weight:700}

  .celebrate{text-align:center}
  .celebrate .big{font-size:64px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
  .confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(106vh) rotate(640deg)}}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:400;background:var(--ink);color:#fff;padding:13px 20px;border-radius:99px;font-weight:600;font-size:14.5px;box-shadow:var(--sh-2);animation:rise .25s ease}

  .glosslist{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ===== Responsive ===== */
  @media(max-width:880px){
    .vcards{grid-template-columns:1fr 1fr}
    .mprev{grid-template-columns:1fr 1fr}
    .why{grid-template-columns:1fr}
    .getlist{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .wrap{padding:0 16px}.narrow{padding:0 16px}
    .vcards{grid-template-columns:1fr 1fr}
    .vcard{padding:16px}
    .card.pad,.card.pad-lg{padding:18px}
    .hub-head{padding:20px}
    .ringwrap{flex-direction:column;align-items:flex-start}
    .glosslist{grid-template-columns:1fr}
    .seg{flex-direction:column}
    .statgrid{grid-template-columns:1fr 1fr}
    .btn{font-size:15px;padding:14px 22px}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important}
  }
</style>
</head>
<body>
<div id="boot"><div class="logo">HUSTLE<b>.OS</b></div><div class="bar"><i></i></div></div>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<!-- App SOURCE. type="text/plain" => the browser and Babel's auto-scan both ignore it.

<script id="appsource" type="text/plain">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================
   DATA
========================================================= */

const INTERESTS = [
  {id:'design', e:'🎨', t:'Дизайн'},
  {id:'video',  e:'🎬', t:'Видео / монтаж'},
  {id:'social', e:'📱', t:'Соцсети'},
  {id:'games',  e:'🎮', t:'Игры'},
  {id:'fashion',e:'👟', t:'Мода / стиль'},
  {id:'teach',  e:'📚', t:'Обучение'},
  {id:'texts',  e:'✍️', t:'Тексты'},
  {id:'resell', e:'🛍️', t:'Тренды / реселл'},
  {id:'food',   e:'🍰', t:'Еда / крафт'},
  {id:'tech',   e:'💻', t:'Технологии'},
];

const SKILLS = [
  {id:'sk_design', t:'Делаю дизайн'},
  {id:'sk_video',  t:'Монтирую видео'},
  {id:'sk_sell',   t:'Умею продавать'},
  {id:'sk_explain',t:'Объясняю сложное просто'},
  {id:'sk_smm',    t:'Веду соцсети'},
  {id:'sk_write',  t:'Пишу тексты'},
  {id:'sk_talk',   t:'Хорошо общаюсь'},
  {id:'sk_analyze',t:'Люблю анализировать'},
  {id:'sk_hands',  t:'Делаю что-то руками'},
];

// weights of each interest/skill towards founder types
const TYPE_WEIGHTS = {
  creative:   {design:3, texts:1, fashion:1, sk_design:3, sk_write:1},
  content:    {video:3, social:3, games:2, sk_video:3, sk_smm:3},
  knowledge:  {teach:3, texts:2, sk_explain:3, sk_write:2, sk_talk:1},
  trader:     {resell:3, fashion:2, sk_sell:3, sk_talk:2, sk_analyze:1},
  maker:      {food:3, fashion:1, sk_hands:3, sk_design:1},

/* =========================================================
   STATE / HELPERS
========================================================= */
const LS_KEY = 'hustleos_v1';
const blankState = () => ({
  view:'landing', profile:null, scan:null, founder:null, path:null, customPath:null,
  done:{}, xp:0, badges:[], learned:[], offer:null, pricing:null,
  templates:null, trapScore:null, rcSmart:0, simSmart:0, trapSmart:0,
  runs:0, allSmart:true,
});
function load(){ try{const r=localStorage.getItem(LS_KEY);return r?{...blankState(),...JSON.parse(r)}:null;}catch(e){return null;} }
function save(s){ try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){} }

function g(state, m, f){ return state.profile && state.profile.gender==='female' ? f : m; }
function fmt(n){ return Math.round(n).toLocaleString('ru-RU').replace(/,/g,' ') + '₸'; }
function pathName(s){ return s.customPath ? s.customPath.name : (s.path ? PATHS[s.path].t : ''); }
function pathEmoji(s){ return s.customPath ? '✨' : (s.path ? PATHS[s.path].e : '🎯'); }
function blueprintPct(s){ let p=0; for(let i=1;i<=8;i++){ if(s.done[i]) p+=BP_STEP[i]; } return p; }

/* =========================================================
   SHARED UI
========================================================= */
function Confetti({fire}){
  if(!fire) return null;
  const cols=['#C7F23E','#6C4DF6','#2F86FF','#FF7A3D','#16A36A'];
  const bits=Array.from({length:80},(_,i)=>({l:Math.random()*100,d:1.6+Math.random()*1.6,delay:Math.random()*.4,c:cols[i%cols.length],r:Math.random()*360}));
  return (<div className="confetti">{bits.map((b,i)=>(
    <i key={i} style={{left:b.l+'%',background:b.c,animationDuration:b.d+'s',animationDelay:b.delay+'s',transform:'rotate('+b.r+'deg)'}}/>
  ))}</div>);
}

function ProgressRing({pct,size=84,stroke=8}){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
  return (<div className="ring" style={{width:size,height:size}}>
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.18)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#C7F23E" strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{transition:'stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)'}}/>
    </svg>
    <div className="pct">{pct}%</div>
  </div>);
}

function Modal({children,onClose,wide}){
  return (<div className="ovl" onClick={onClose}>
    <div className="modal" style={wide?{maxWidth:640}:{}} onClick={e=>e.stopPropagation()}>
      <button className="x" onClick={onClose}>✕</button>
      {children}
    </div>
  </div>);
}

function Toast({msg}){ return msg ? <div className="toast">{msg}</div> : null; }

// glossary term pill that opens modal via context-like prop
function Term({k,children,onOpen}){
  return <span className="term" onClick={()=>onOpen(k)}>{children||k}</span>;
}

/* =========================================================

========================================================= */
function Register({ctx}){
  const [name,setName]=useState(ctx.s.profile?.name||'');
  const [email,setEmail]=useState(ctx.s.profile?.email||'');
  const [gender,setGender]=useState(ctx.s.profile?.gender||'');
  const ok = name.trim().length>0 && gender;
  const start=()=>{
    if(!ok) return;
    ctx.up({profile:{name:name.trim(),email:email.trim(),gender}});
    ctx.go('map');
  };
  return (<div className="screen narrow pad-top">
    <span className="link" onClick={()=>ctx.go('landing')}>← На главную</span>
    <div className="card pad-lg mt16">
      <span className="eyebrow">Старт</span>
      <h2 className="mt12" style={{fontSize:28}}>Давай познакомимся</h2>
      <p className="muted mt8">Пароль не нужен. Всё сохраняется только на твоём устройстве.</p>

      <div className="field mt24">
        <label>Как тебя зовут?</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Например, Алихан" maxLength={24}/>
      </div>
      <div className="field mt16">
        <label>Email <span className="faint">(необязательно)</span></label>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@mail.com"/>
      </div>
      <div className="field mt16">
        <label>Пол <span className="faint">(чтобы обращаться правильно)</span></label>
        <div className="seg">
          <button className={'opt'+(gender==='male'?' on':'')} onClick={()=>setGender('male')}>Парень</button>
          <button className={'opt'+(gender==='female'?' on':'')} onClick={()=>setGender('female')}>Девушка</button>
        </div>
      </div>

      <button className="btn lime block lg mt24" disabled={!ok} onClick={start}>Начать квест →</button>
    </div>
  </div>);
}

/* =========================================================
   QUEST MAP
========================================================= */
function QuestMap({ctx}){
  const s=ctx.s;
  const pct=blueprintPct(s);
  const nextId = MISSIONS.find(m=>!s.done[m.id])?.id || 9;
  const status=(id)=> s.done[id]?'done':(id===nextId?'active':(id<nextId?'done':'locked'));
  const open=(id)=>{ const st=status(id); if(st==='locked') return; ctx.go('m'+id); };
  return (<div className="screen wrap pad-top">
    {/* HUB HEAD */}
    <div className="hub-head">
      <div className="glow"></div><div className="glow2"></div>
      <div className="ringwrap" style={{position:'relative'}}>
        <ProgressRing pct={pct}/>
        <div className="grow">
          <div style={{color:'rgba(255,255,255,.7)',fontWeight:600,fontSize:14}}>Привет, {s.profile?.name||'друг'} 👋</div>
          <h2 style={{color:'#fff'}}>{s.founder ? FOUNDER_TYPES[s.founder].e+' '+FOUNDER_TYPES[s.founder].name : 'Твой Launch Blueprint'}</h2>
          <div style={{color:'rgba(255,255,255,.66)',fontSize:14,marginTop:4}}>Launch Blueprint готов на {pct}% · ⚡ {s.xp} XP · 📖 {s.learned.length}/{Object.keys(GLOSSARY).length} терминов</div>
        </div>
      </div>
      <div className="badgestrip mt20">
        {Object.entries(BADGES).map(([k,b])=>(
          <div key={k} className={'badge '+(s.badges.includes(k)?'got':'lock')} title={b.name+' — '+b.hint}>{b.e}</div>
        ))}
      </div>
    </div>

    {/* PATH */}
    <div className="path">
      <div className="line"></div>
      {MISSIONS.map(m=>{
        const st=status(m.id);
        const clickable = st!=='locked';
        return (<div key={m.id} className={'mnode '+st}>
          <div className="dot">{st==='done'?'✓':(st==='locked'?'🔒':m.e)}</div>
          <div className={'mcard'+(clickable?' click':'')} onClick={()=>clickable&&open(m.id)}>
            <div className="row" style={{justifyContent:'space-between'}}>
              <div className="row gap8">
                <span className="faint tiny" style={{fontFamily:'var(--display)',fontWeight:800}}>М{m.id}</span>
                <h4>{m.t}</h4>
              </div>
              {st==='active' && <span className="pill l">+50 XP</span>}
              {st==='done' && <span className="pill g">✓ готово</span>}
              {st==='locked' && <span className="pill" style={{background:'var(--bg2)',color:'var(--faint)'}}>🔒</span>}
            </div>
            <p className="muted small mt8">{m.sub}</p>
            <div className="unlocks">🔓 Откроется: {m.unlocks}</div>
          </div>
        </div>);
      })}
    </div>

    <div className="row wrapf mt24" style={{justifyContent:'center'}}>
      <button className="btn ghost sm" onClick={()=>ctx.go('glossary')}>📖 Глоссарий</button>
      <button className="btn ghost sm" onClick={()=>ctx.go('settings')}>⚙️ Настройки и сброс</button>
    </div>
  </div>);
}

/* ===================== MISSION 1 — SCAN ===================== */
function MScan({ctx}){
  const m=MISSIONS[0]; const s=ctx.s;
  const [step,setStep]=useState(s.done[1]?4:0);
  const [ints,setInts]=useState(s.scan?.interests||[]);
  const [sks,setSks]=useState(s.scan?.skills||[]);
  const [time,setTime]=useState(s.scan?.time||'');
  const [budget,setBudget]=useState(s.scan?.budget||'');
  const [fear,setFear]=useState(s.scan?.fear||'');
  const [founder,setFounder]=useState(s.founder||null);
  const tog=(arr,set,id)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  const compute=()=>{
    const sc={creative:0,content:0,knowledge:0,trader:0,maker:0,tech:0};
    [...ints,...sks].forEach(id=>{for(const ft in TYPE_WEIGHTS){if(TYPE_WEIGHTS[ft][id])sc[ft]+=TYPE_WEIGHTS[ft][id];}});
    let best='content',bv=-1; ['content','creative','knowledge','trader','maker','tech'].forEach(ft=>{if(sc[ft]>bv){bv=sc[ft];best=ft;}});
    return bv<=0?'content':best;
  };
  const toResult=()=>{ const f=compute(); setFounder(f);
    ctx.up({scan:{interests:ints,skills:sks,time,budget,fear},founder:f}); setStep(3); window.scrollTo(0,0); };
  const finish=()=>{ ctx.completeMission(1,{badge:'self'}); };

  if(step===0) return (<MissionShell m={m} ctx={ctx} step={0} total={3}>
    <div className="card pad mt8"><span className="eyebrow">Шаг 1 · Интересы</span>
      <h3 className="mt8" style={{fontSize:19}}>Что тебе по кайфу?</h3>
      <p className="muted small mt8 mb16">Выбери всё, что цепляет. Можно несколько.</p>
      <Chips list={INTERESTS} sel={ints} onToggle={id=>tog(ints,setInts,id)} lime/>
    </div>
    <button className="btn lime block lg mt20" disabled={!ints.length} onClick={()=>{setStep(1);window.scrollTo(0,0);}}>Дальше →</button>
  </MissionShell>);

  if(step===1) return (<MissionShell m={m} ctx={ctx} step={1} total={3}>
    <div className="card pad mt8"><span className="eyebrow">Шаг 2 · Навыки</span>
      <h3 className="mt8" style={{fontSize:19}}>Что ты уже умеешь?</h3>
      <p className="muted small mt8 mb16">Даже если кажется, что «так себе» — отмечай.</p>
      <Chips list={SKILLS} sel={sks} onToggle={id=>tog(sks,setSks,id)}/>
    </div>
    <div className="row gap12 mt20"><button className="btn ghost" onClick={()=>setStep(0)}>← Назад</button>
      <button className="btn lime grow" disabled={!sks.length} onClick={()=>{setStep(2);window.scrollTo(0,0);}}>Дальше →</button></div>
  </MissionShell>);

  if(step===2) return (<MissionShell m={m} ctx={ctx} step={2} total={3}>
    <div className="card pad mt8"><span className="eyebrow">Шаг 3 · Ресурсы</span>
      <h3 className="mt8 mb16" style={{fontSize:19}}>Сколько времени готов(а) тратить в неделю?</h3>
      <SegPick opts={['до 3 часов','3–7 часов','7+ часов']} val={time} onPick={setTime}/>
      <h3 className="mt24 mb16" style={{fontSize:19}}>Есть стартовый бюджет?</h3>
      <SegPick opts={['0₸','до 30 000₸','30 000₸+']} val={budget} onPick={setBudget}/>
      <h3 className="mt24 mb16" style={{fontSize:19}}>Что пугает больше всего?</h3>
      <SegPick opts={['не знаю, с чего начать','боюсь клиентов','не умею считать цену','боюсь скама','боюсь, что не получится']} val={fear} onPick={setFear}/>
    </div>
    <div className="row gap12 mt20"><button className="btn ghost" onClick={()=>setStep(1)}>← Назад</button>
      <button className="btn lime grow" disabled={!time||!budget||!fear} onClick={toResult}>Узнать мой тип →</button></div>
  </MissionShell>);

  // result
  const f=FOUNDER_TYPES[founder||s.founder||'content'];
  return (<MissionShell m={m} ctx={ctx}>
    <div className="card pad-lg mt8" style={{background:'linear-gradient(135deg,#241a44,#352765)',border:'none',color:'#fff'}}>

      {f.strengths.map((x,i)=>(<div className="soft mt12" key={i}><b>{x.t}</b><p className="muted small mt8">{x.x}</p></div>))}
    </div>
    <div className="card pad mt16"><h3 style={{fontSize:18,color:'var(--orange)'}}>⚠️ Где легко споткнуться</h3>

  const m=MISSIONS[2]; const s=ctx.s;

  const choose=(val)=>{ if(picked)return; setPicked(val); ctx.learn(card.term); if(val===card.a) setCorrect(c=>c+1); };
  const next=()=>{ if(idx<RC_CARDS.length-1){setIdx(idx+1);setPicked(null);window.scrollTo(0,0);} else setPhase('done'); };

/* ===================== MISSION 5 — PRICING LAB ===================== */
function num(v){ return parseFloat(String(v).replace(/\s/g,'').replace(',','.'))||0; }
function MPricing({ctx}){
  const m=MISSIONS[4]; const s=ctx.s;
  const p0=s.pricing||{};
  const [hours,setHours]=useState(p0.hours??'');
  const [mat,setMat]=useState(p0.materials??'');
  const [fees,setFees]=useState(p0.fees??'');
  const [rate,setRate]=useState(p0.desiredHourly??'');
  const [wantProfit,setWantProfit]=useState(p0.desiredProfit??'');
  const [price,setPrice]=useState(p0.price??'');

  const H=num(hours), M=num(mat), F=num(fees), R=num(rate), WP=num(wantProfit), PR=num(price);
  const directCost=M+F;                 // наличные расходы
  const timeCost=H*R;                   // стоимость твоего времени
  const cost=directCost+timeCost;       // себестоимость с учётом времени
  const profit=PR-directCost;           // прибыль после наличных расходов
  const margin=PR>0? Math.round((profit/PR)*100):0;
  const perHour=H>0? profit/H : 0;
  const minSafe=directCost+timeCost+WP; // минимальная безопасная цена
  const rangeLo=minSafe, rangeHi=Math.round(minSafe*1.4);
  const ratio=minSafe>0? PR/minSafe : 0;
  const zone = !PR? 'none' : (ratio<0.95?'red':(ratio<1.25?'yellow':'green'));
  const pinPct=Math.max(4,Math.min(96, ((Math.min(ratio,2))/2)*100 ));
  const filled = H&&price;

  const finish=()=>{
    ctx.up({pricing:{hours:H,materials:M,fees:F,desiredHourly:R,desiredProfit:WP,price:PR,
      cost,profit,margin,perHour:Math.round(perHour),minSafe,rangeLo,rangeHi}});
    const healthy = zone==='green'||zone==='yellow';
    ctx.completeMission(5,{badge:'price',bonusXp:healthy?20:0,smart:healthy});
  };
  return (<MissionShell m={m} ctx={ctx}>
    <p className="muted mt8">Считаем по-честному: <Term k="выручка" onOpen={ctx.openTerm}>выручка</Term> ≠ <Term k="прибыль" onOpen={ctx.openTerm}>прибыль</Term>. Цена должна учитывать и твоё время.</p>
    <div className="card pad mt16">
      <div className="field mt16"><label>Сколько часов занимает работа? <span className="faint">· часы</span></label>
        <input inputMode="numeric" value={hours} onChange={e=>setHours(e.target.value)} placeholder="например, 5"/></div>
      <div className="field mt16"><label>Расходы на материалы / инструменты <span className="faint">· ₸</span></label>
        <input inputMode="numeric" value={mat} onChange={e=>setMat(e.target.value)} placeholder="0, если их нет"/></div>

/* ===================== MISSION 6 — CLIENT SIMULATOR ===================== */
function MClient({ctx}){
  const m=MISSIONS[5]; const s=ctx.s;
  const total=SIM.reduce((a,c)=>a+c.steps.length,0);
  const [phase,setPhase]=useState(s.done[6]?'gen':'intro');
  const [ci,setCi]=useState(0);
  const [si,setSi]=useState(0);
  const [picked,setPicked]=useState(null);
  const [smart,setSmart]=useState(0);
  const conv=SIM[ci]; const stepObj=conv?.steps[si];

  const choose=(opt)=>{ if(picked)return; setPicked(opt); if(opt.kind==='smart') setSmart(x=>x+1); };
  const next=()=>{
    setPicked(null);
    if(si<conv.steps.length-1){ setSi(si+1); }
    else if(ci<SIM.length-1){ setCi(ci+1); setSi(0); }
    else { setPhase('gen'); }
    window.scrollTo(0,0);
  };

  // generated templates
  const name=s.profile?.name||'Я'; const o=s.offer||{};
  const price=o.price||'договоримся'; const pkg=o.pkg||'Стартовый пакет';
  const result=o.result||'получить результат'; const service=o.service||'делаю свою работу под ваш запрос';
  const noticed=g(s,'Заметил','Заметила'); const ready=g(s,'готов','готова');
  const templates={
    dm:`Здравствуйте! Меня зовут ${name}. ${noticed}, что вам может пригодиться помощь: ${result}. Я ${service}. ${pkg} — ${price}. Скинуть пару примеров?`,
    pricey:`Понимаю, что хочется сравнить цену. В неё входит не просто «сделать», а ${service} плюс правки — это влияет на результат. Могу предложить мини-пакет поменьше, чтобы вы оценили без риска, а цену за полный объём оставить прежней.`,
    prepay:`Чтобы стартовать, беру предоплату 50% — так я резервирую время под вас, а вы спокойны, что я не пропаду. Остальное — после готовой работы. Скинуть реквизиты?`,
    follow:`Привет! Возвращаюсь по поводу ${result}. Если ещё актуально — я ${ready} начать на этой неделе и быстро показать первый результат. Что скажете?`,
  };
  const copy=(t)=>{ try{navigator.clipboard.writeText(t).then(()=>ctx.showToast('Скопировано ✓'));}catch(e){ctx.showToast('Выдели и скопируй вручную');} };
  const finish=()=>{ ctx.up({templates}); ctx.completeMission(6,{badge:'client',bonusXp:smart*15,smart:smart>=Math.ceil(total*0.6),extra:{simSmart:smart}}); };

  if(phase==='intro') return (<MissionShell m={m} ctx={ctx}>
    <p className="muted mt8">Три коротких диалога с клиентом. Выбирай ответ — и сразу увидишь, почему он работает или вредит. В конце соберём твои личные шаблоны сообщений.</p>
    <div className="col gap12 mt20">{SIM.map((c,i)=>(<div key={i} className="soft row gap12"><span style={{fontSize:24}}>{c.icon}</span><b>{c.title}</b></div>))}</div>
    <button className="btn lime block lg mt20" onClick={()=>setPhase('sim')}>Начать диалоги →</button>
  </MissionShell>);

  if(phase==='sim' && stepObj){
    const stepNo = SIM.slice(0,ci).reduce((a,c)=>a+c.steps.length,0)+si;
    return (<MissionShell m={m} ctx={ctx} step={stepNo} total={total}>
      <div className="row gap8 mt8"><span className="pill v">{conv.icon} {conv.title}</span><span className="tiny faint">шаг {si+1}/{conv.steps.length}</span></div>
      <div className="card pad-lg mt12" style={{background:'var(--bg2)'}}>
        <span className="tiny faint" style={{fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em'}}>Клиент</span>
        <p className="mt8" style={{fontSize:17,fontWeight:600,lineHeight:1.45}}>{stepObj.client}</p>
      </div>
      <div className="col gap12 mt16">
        {stepObj.opts.map((opt,i)=>{
          const isPick=picked===opt; const show=!!picked;
          const cls = show&&isPick ? (opt.kind==='smart'?'optcard on':'optcard on') : 'optcard';
          return (<button key={i} className={cls} disabled={show} onClick={()=>choose(opt)}
            style={show&&isPick?{borderColor:opt.kind==='smart'?'var(--green)':opt.kind==='risky'?'var(--orange)':'var(--red)'}:{}}>
            <span className="k">{show&&isPick?(opt.kind==='smart'?'✓':'•'):'·'}</span><span style={{fontWeight:600}}>{opt.t}</span>
          </button>);
        })}
      </div>
      {picked && <div className={'feedback '+(picked.kind==='smart'?'good':picked.kind==='risky'?'warn':'bad')}>
        <h4>{picked.kind==='smart'?'🎯 Сильный ответ':picked.kind==='risky'?'⚠️ Так себе':'🚫 Лучше не так'}</h4>
        <p className="small">{picked.fb}</p>
      </div>}
      {picked && <button className="btn lime block lg mt16" onClick={next}>{(ci===SIM.length-1&&si===conv.steps.length-1)?'К шаблонам →':'Дальше →'}</button>}
    </MissionShell>);
  }

  // gen templates
  const T=[
    {k:'dm',icon:'📨',t:'Первое сообщение (DM)'},
    {k:'pricey',icon:'💸',t:'Ответ на «дорого»'},
    {k:'prepay',icon:'🔒',t:'Просьба о предоплате'},
    {k:'follow',icon:'🔁',t:'Follow-up (напоминание)'},
  ];
  return (<MissionShell m={m} ctx={ctx}>
    <div className="card pad-lg mt8 center" style={{background:'linear-gradient(135deg,#241a44,#352765)',border:'none',color:'#fff'}}>
      <div style={{fontSize:44}}>💬</div>
      <h2 style={{color:'#fff',fontSize:24}}>Готовые шаблоны под тебя</h2>
      <p className="mt8" style={{color:'rgba(255,255,255,.78)'}}>Сильных ответов: {smart} из {total}. Шаблоны собраны на основе твоего оффера — можно копировать и слать.</p>
    </div>
    <div className="col gap12 mt16">
      {T.map(x=>(<div className="card pad" key={x.k}>
        <div className="row" style={{justifyContent:'space-between'}}><b>{x.icon} {x.t}</b>
          <button className="btn ghost sm" onClick={()=>copy(templates[x.k])}>Копировать</button></div>
        <p className="muted small mt12" style={{lineHeight:1.5,whiteSpace:'pre-wrap'}}>{templates[x.k]}</p>
      </div>))}
    </div>
    <button className="btn lime block lg mt20" onClick={finish}>Сохранить шаблоны +{50+smart*15} XP →</button>
  </MissionShell>);
}

/* ===================== MISSION 7 — TRAP CHECK ===================== */
function MTrap({ctx}){
  const m=MISSIONS[6]; const s=ctx.s;
  const [phase,setPhase]=useState(s.done[7]?'done':'intro');
  const [idx,setIdx]=useState(0);
  const [picked,setPicked]=useState(null);
  const [correct,setCorrect]=useState(0);
  const tr=TRAPS[idx];
  const choose=(i)=>{ if(picked!==null)return; setPicked(i); ctx.learn(tr.term); if(tr.opts[i].ok) setCorrect(c=>c+1); };
  const next=()=>{ if(idx<TRAPS.length-1){setIdx(idx+1);setPicked(null);window.scrollTo(0,0);} else {setPhase('done');window.scrollTo(0,0);} };
  const finish=()=>{ ctx.completeMission(7,{badge:'scam',bonusXp:correct*10,smart:correct>=Math.ceil(TRAPS.length*0.7),extra:{trapScore:correct,trapSmart:correct}}); };

  if(phase==='intro') return (<MissionShell m={m} ctx={ctx}>
    <p className="muted mt8">7 ситуаций, в которых новичков чаще всего разводят. Выбери действие — и разберём красные флаги. Без страха: цель — научиться, а не запугать.</p>
    <div className="soft mt16" style={{background:'var(--green-soft)',borderColor:'#BfeBD2'}}>💚 Не бойся пробовать. Просто думай перед тем, как отправлять деньги или работать бесплатно.</div>
    <button className="btn lime block lg mt20" onClick={()=>setPhase('game')}>Поехали →</button>
  </MissionShell>);

  if(phase==='game'){
    const done=picked!==null; const ok=done&&tr.opts[picked].ok;
    return (<MissionShell m={m} ctx={ctx} step={idx} total={TRAPS.length}>
      <div className="row gap8 mt8"><span className="pill o">🚩 Ситуация {idx+1}/{TRAPS.length}</span></div>
      <div className="card pad-lg mt12"><h3 style={{fontSize:18}}>{tr.title}</h3><p className="muted mt8" style={{lineHeight:1.5}}>{tr.s}</p></div>
      <div className="col gap12 mt16">
        {tr.opts.map((opt,i)=>{
          const show=done; const isPick=picked===i;
          return (<button key={i} className={'optcard'+(isPick?' on':'')} disabled={show} onClick={()=>choose(i)}
            style={show?{borderColor: opt.ok?'var(--green)':(isPick?'var(--red)':'var(--line2)'), opacity: opt.ok||isPick?1:.55}:{}}>
            <span className="k">{show?(opt.ok?'✓':(isPick?'✕':'·')):'·'}</span><span style={{fontWeight:600}}>{opt.t}</span>
          </button>);
        })}
      </div>
      {done && <div className={'feedback '+(ok?'good':'bad')}>
        <h4>{ok?'🛡️ Верно, это безопасный ход':'🚩 Осторожно — так и разводят'}</h4>
        <p className="small">{tr.ex}</p>
        <div className="mt12 small">📖 Термин: <Term k={tr.term} onOpen={ctx.openTerm}>{tr.term}</Term></div>
      </div>}
      {done && <button className="btn lime block lg mt16" onClick={next}>{idx<TRAPS.length-1?'Следующая ситуация →':'К итогам →'}</button>}
    </MissionShell>);
  }

  return (<MissionShell m={m} ctx={ctx}>
    <div className="card pad-lg mt8 center"><div style={{fontSize:48}}>🛡️</div>
      <h2 className="mt12" style={{fontSize:24}}>Распознал(а) {correct} из {TRAPS.length}</h2>
      <p className="muted mt8">Теперь у тебя есть антискам-чутьё. Вот твои правила безопасности на старте:</p>
    </div>
    <div className="card pad mt16">
      <div className="col gap12">{SAFETY_RULES.map((r,i)=>(<div key={i} className="soft" style={{fontWeight:600}}>{r}</div>))}</div>
    </div>
    <div className="soft mt16" style={{background:'var(--green-soft)',borderColor:'#BfeBD2'}}>💚 Не бойся пробовать. Просто думай перед тем, как отправлять деньги или работать бесплатно.</div>
    <button className="btn lime block lg mt20" onClick={finish}>Забрать +{50+correct*10} XP →</button>
  </MissionShell>);
}

/* ===================== MISSION 8 — LAUNCH BLUEPRINT ===================== */
function planFor(s){
  const pn=pathName(s)||'твоего дела';
  return [
    'День 1: собери 3 примера работ (можно учебных) — это твоё мини-портфолио',

    'День 3: отправь 10 коротких DM по твоему шаблону',
    'День 4: сделай follow-up тем, кто не ответил',
    'День 5: выполни один маленький платный пробник с предоплатой',
    'День 6: попроси отзыв и разрешение показать результат',
    'День 7: улучши оффер и цену по обратной связи и повтори цикл',
  ];
}
function blueprintText(s){
  const f=s.founder?FOUNDER_TYPES[s.founder]:null;
  const o=s.offer||{}; const pr=s.pricing||{}; const t=s.templates||{};
  const L=[];
  L.push('HUSTLE.OS — LAUNCH BLUEPRINT');
  L.push('Автор: '+(s.profile?.name||'—'));
  L.push('');
  if(f){ L.push('1. ТИП ФАУНДЕРА: '+f.e+' '+f.name); L.push(f.desc); L.push(''); }
  L.push('2. ПУТЬ ЗАРАБОТКА: '+pathEmoji(s)+' '+pathName(s));
  if(s.path&&PATHS[s.path]){ L.push('Почему подходит: '+PATHS[s.path].why); L.push('Потенциал: '+PATHS[s.path].potential+' · Риск: '+PATHS[s.path].risk); }
  else if(s.customPath?.desc){ L.push(s.customPath.desc); }
  L.push('');
  if(o.sentence){ L.push('3. ОФФЕР:'); L.push(o.sentence); L.push('Пакет: '+(o.pkg||'-')+' · Цена: '+(o.price||'-')); L.push(''); }
  if(pr.price){ L.push('4. ЦЕНА И ПРИБЫЛЬ:'); L.push('Цена: '+fmt(pr.price)+' · Себестоимость: '+fmt(pr.cost)+' · Прибыль: '+fmt(pr.profit)+' · Маржа: '+pr.margin+'%'); L.push('Мин. безопасная цена: '+fmt(pr.minSafe)+' · Доход в час: '+fmt(pr.perHour)); L.push(''); }
  if(t.dm){ L.push('5. СООБЩЕНИЯ КЛИЕНТУ:'); L.push('— Первое: '+t.dm); L.push('— На «дорого»: '+t.pricey); L.push('— Предоплата: '+t.prepay); L.push('— Follow-up: '+t.follow); L.push(''); }
  L.push('6. ПРАВИЛА БЕЗОПАСНОСТИ:'); SAFETY_RULES.forEach(r=>L.push(r.replace(/^[^ ]+ /,'• '))); L.push('');
  L.push('7. ПЛАН НА 7 ДНЕЙ:'); planFor(s).forEach(d=>L.push('• '+d)); L.push('');
  if(s.nextStep){ L.push('8. ПЕРВЫЙ ШАГ СЕГОДНЯ: '+s.nextStep); }
  L.push(''); L.push('Сделано в HUSTLE.OS 💚 Главное — начать маленькими шагами.');
  return L.join('\n');
}

          <div className="st"><div className="l">Риск</div><div className="v">{P.risk}</div></div>
        </div>
      </> : <p className="muted">{s.customPath?.desc||'Твоя собственная идея — двигайся маленькими шагами и проверяй спрос до вложений.'}</p>}
    </Sec>

    {o.sentence && <Sec n="3" icon="📦" title="Твой оффер">
      <div className="offerprev"><div className="tag"></div>
        <p style={{fontSize:18,fontWeight:600,lineHeight:1.45,position:'relative'}}>{o.sentence}</p></div>
      <div className="row wrapf gap8 mt12"><span className="pill v">👥 {o.who||'аудитория'}</span><span className="pill v">📦 {o.pkg||'пакет'}</span><span className="pill v">💵 {o.price||'цена'}</span></div>
    </Sec>}

    {pr.price && <Sec n="4" icon="💰" title="Цена и прибыль">
      <div className="statgrid">
        <div className="st"><div className="l">Цена</div><div className="v">{fmt(pr.price)}</div></div>
        <div className="st"><div className="l">Прибыль</div><div className="v">{fmt(pr.profit)}</div></div>
        <div className="st"><div className="l">Маржа</div><div className="v">{pr.margin}%</div></div>
        <div className="st"><div className="l">Мин. безопасная</div><div className="v">{fmt(pr.minSafe)}</div></div>
      </div>
    </Sec>}

    {t.dm && <Sec n="5" icon="💬" title="Сообщения клиенту">
      {[['📨 Первое',t.dm],['💸 На «дорого»',t.pricey],['🔒 Предоплата',t.prepay],['🔁 Follow-up',t.follow]].map(([lab,txt],i)=>(
        <div key={i} className="soft mt12"><b className="small">{lab}</b><p className="muted small mt8" style={{whiteSpace:'pre-wrap'}}>{txt}</p></div>))}
    </Sec>}

    <Sec n="6" icon="🛡️" title="Чеклист безопасности">
      <div className="col gap8">{SAFETY_RULES.map((r,i)=><div key={i} className="soft" style={{fontWeight:600}}>{r}</div>)}</div>
    </Sec>

    <Sec n="7" icon="🗓️" title="План на 7 дней">
      <div className="col gap8">{planFor(s).map((d,i)=>(<div key={i} className="soft small" style={{fontWeight:600}}>{d}</div>))}</div>
    </Sec>

    <Sec n="8" icon="🎯" title="Что ты сделаешь сегодня?">
      <p className="muted small">Выбери один маленький шаг — и сделай его сегодня. Главное — начать.</p>
      <div className="col gap12 mt12">{NEXT.map(o2=>(<button key={o2} className={'optcard'+(next===o2?' on':'')} onClick={()=>{setNext(o2);ctx.up({nextStep:o2});}}>
        <span className="k">{next===o2?'✓':'·'}</span><span style={{fontWeight:600}}>{o2}</span></button>))}</div>
    </Sec>

    <div className="row wrapf gap12 mt24">
      <button className="btn lime grow" onClick={copyAll}>📋 Скопировать</button>
      <button className="btn violet grow" onClick={download}>⬇️ Скачать .txt</button>
      <button className="btn ghost grow" onClick={share}>🔗 Поделиться</button>
    </div>
    <button className="btn ghost block mt12" onClick={replay}>🔁 Пройти квест с другим путём</button>
    <div className="soft mt16 center" style={{background:'var(--green-soft)',borderColor:'#BfeBD2'}}>💚 Главное — начать. Маленькими и безопасными шагами. У тебя получится.</div>
    <div className="mt40"/>
  </div>);
}

/* ===================== GLOSSARY SCREEN ===================== */
function GlossaryScreen({ctx}){
  const s=ctx.s; const entries=Object.entries(GLOSSARY);
  return (<div className="screen narrow pad-top">
    <span className="link" onClick={()=>ctx.go('map')}>← К карте квеста</span>
    <h2 className="mt16" style={{fontSize:26}}>📖 Глоссарий</h2>
    <p className="muted mt8">Изучено терминов: <b>{s.learned.length}</b> / {entries.length}. Нажми на термин, чтобы открыть объяснение.</p>
    <div className="col gap12 mt20">
      {entries.map(([k,t])=>(
        <div key={k} className="card pad" onClick={()=>ctx.openTerm(k)} style={{display:'flex',gap:14,alignItems:'center',cursor:'pointer'}}>
          <span style={{fontSize:26}}>{t.e}</span>
          <div className="grow"><b style={{textTransform:'capitalize'}}>{k}</b><p className="muted small mt4">{t.def}</p></div>
          {s.learned.includes(k)?<span className="pill g">✓</span>:<span className="pill" style={{background:'var(--bg2)',color:'var(--faint)'}}>?</span>}
        </div>
      ))}
    </div>
    <div className="mt40"/>
  </div>);
}

/* ===================== SETTINGS ===================== */
function Settings({ctx}){
  const s=ctx.s; const [confirm,setConfirm]=useState(false);
  return (<div className="screen narrow pad-top">
    <span className="link" onClick={()=>ctx.go('map')}>← К карте квеста</span>
    <h2 className="mt16" style={{fontSize:26}}>⚙️ Настройки</h2>
    <div className="card pad-lg mt16">
      <h3 style={{fontSize:18}}>Профиль</h3>
      <p className="muted small mt8">Имя: <b>{s.profile?.name||'—'}</b>{s.profile?.email?(' · '+s.profile.email):''}</p>
      <p className="muted small mt8">⚡ {s.xp} XP · 🏅 {s.badges.length} бейджей · 📋 Blueprint {blueprintPct(s)}%</p>
      <p className="muted small mt8">Всё хранится только на этом устройстве (localStorage). Сервера и аккаунтов нет.</p>
    </div>
    <div className="card pad-lg mt16" style={{borderColor:'var(--red)'}}>
      <h3 style={{fontSize:18,color:'var(--red)'}}>Сбросить прогресс</h3>
      <p className="muted small mt8">Удалит весь прогресс, бейджи, оффер и Blueprint. Отменить нельзя.</p>
      {!confirm
        ? <button className="btn ghost mt16" onClick={()=>setConfirm(true)}>Сбросить прогресс…</button>
        : <div className="row gap12 mt16 wrapf">
            <button className="btn ghost grow" onClick={()=>setConfirm(false)}>Отмена</button>
            <button className="btn grow" style={{background:'var(--red)',color:'#fff'}} onClick={()=>ctx.reset()}>Да, удалить всё</button>
          </div>}
    </div>
    <div className="mt40"/>
  </div>);
}

/* ===================== GLOSSARY + CELEBRATE MODALS ===================== */
function GlossModal({k,onClose}){
  const t=GLOSSARY[k]; if(!t) return null;
  return (<Modal onClose={onClose}>
    <div style={{fontSize:42}}>{t.e}</div>
    <h2 style={{fontSize:24,marginTop:6,textTransform:'capitalize'}}>{k}</h2>
    <p className="mt12" style={{fontSize:16,lineHeight:1.5}}>{t.def}</p>
    <div className="soft mt16"><b className="small">📍 Пример из жизни</b><p className="muted small mt8">{t.ex}</p></div>
    <div className="soft mt12"><b className="small">💡 Почему это важно</b><p className="muted small mt8">{t.why}</p></div>
    {t.flags && <div className="feedback bad" style={{marginTop:12}}><h4>🚩 Красные флаги</h4><p className="small">{t.flags}</p></div>}
    <button className="btn lime block mt20" onClick={onClose}>Понятно ✓</button>
  </Modal>);
}
function CelebrateModal({data,onClose}){
  return (<Modal onClose={onClose}>
    <div className="celebrate">
      <div className="big">{data.emoji}</div>
      <h2 className="mt12" style={{fontSize:25}}>{data.title}</h2>
      {data.sub && <p className="muted mt8">{data.sub}</p>}
      <div className="row gap12 mt20" style={{justifyContent:'center',flexWrap:'wrap'}}>
        {data.xp>0 && <span className="pill l">⚡ +{data.xp} XP</span>}
        <span className="pill v">📋 Blueprint {data.pct}%</span>
      </div>
      <button className="btn lime block lg mt24" onClick={onClose}>{data.goMap?'Продолжить →':'Смотреть Blueprint →'}</button>
    </div>
  </Modal>);
}

/* =========================================================
   APP ROOT
========================================================= */
function App(){
  const [state,setState]=useState(()=> load()||blankState());
  const [glossKey,setGlossKey]=useState(null);
  const [celebrate,setCelebrate]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const [toast,setToast]=useState('');
  const toastRef=useRef(null); const confRef=useRef(null);

  useEffect(()=>{ save(state); },[state]);
  useEffect(()=>{ const b=document.getElementById('boot'); if(b) b.style.display='none'; },[]);

  const up=(patch)=> setState(s=>({...s,...patch}));
  const go=(view)=>{ setState(s=>({...s,view})); window.scrollTo(0,0); };
  const learn=(k)=> setState(s=> s.learned.includes(k)?s:{...s,learned:[...s.learned,k]});
  const openTerm=(k)=>{ setGlossKey(k); setState(s=> s.learned.includes(k)?s:{...s,learned:[...s.learned,k]}); };
  const showToast=(msg)=>{ setToast(msg); if(toastRef.current)clearTimeout(toastRef.current); toastRef.current=setTimeout(()=>setToast(''),2200); };
  const reset=()=>{ try{localStorage.removeItem(LS_KEY);}catch(e){} if(toastRef.current)clearTimeout(toastRef.current); if(confRef.current)clearTimeout(confRef.current); setCelebrate(null); setConfetti(false); setGlossKey(null); setState(blankState()); window.scrollTo(0,0); };

  const completeMission=(id,opts={})=>{
    const already=!!state.done[id];
    const gained= already?0:(50+(opts.bonusXp||0));
    const predictedPct = blueprintPct({...state,done:{...state.done,[id]:true}});
    setState(prev=>{
      let ns={...prev, done:{...prev.done,[id]:true}};
      if(!already) ns.xp=prev.xp+(50+(opts.bonusXp||0));
      if(opts.extra) ns={...ns,...opts.extra};
      if(opts.badge && !ns.badges.includes(opts.badge)) ns.badges=[...ns.badges,opts.badge];
      if(opts.smart===false) ns.allSmart=false;
      if(id===8){
        if(!ns.badges.includes('launch')) ns.badges=[...ns.badges,'launch'];
        if(ns.allSmart && !ns.badges.includes('perfect')) ns.badges=[...ns.badges,'perfect'];
      }
      return ns;
    });
    const b=opts.badge?BADGES[opts.badge]:null;
    setCelebrate({emoji:b?b.e:'🎉', title:b?('Бейдж: '+b.name):'Миссия пройдена!', sub:b?b.hint:'', xp:gained, pct:predictedPct, goMap:id!==8});
    setConfetti(true); if(confRef.current)clearTimeout(confRef.current); confRef.current=setTimeout(()=>setConfetti(false),2800);
  };

  const ctx={s:state,up,go,learn,openTerm,showToast,reset,completeMission,setGlossKey};

  const V=state.view;
  const MAP={m1:MScan,m2:MMatch,m3:MReality,m4:MOffer,m5:MPricing,m6:MClient,m7:MTrap,m8:MBlueprint};
  let screen;
  if(V==='landing') screen=<Landing ctx={ctx}/>;
  else if(V==='register') screen=<Register ctx={ctx}/>;
  else if(V==='map') screen=<QuestMap ctx={ctx}/>;
  else if(V==='glossary') screen=<GlossaryScreen ctx={ctx}/>;
  else if(V==='settings') screen=<Settings ctx={ctx}/>;
  else if(MAP[V]){ const C=MAP[V]; screen=<C ctx={ctx}/>; }
  else screen=<Landing ctx={ctx}/>;

  const showTop = !(V==='landing'||V==='register');
  const closeCelebrate=()=>{ const gm=celebrate&&celebrate.goMap; setCelebrate(null); if(gm) go('map'); };

  return (<React.Fragment>
    {showTop && <TopBar ctx={ctx}/>}
    {screen}
    {glossKey && <GlossModal k={glossKey} onClose={()=>setGlossKey(null)}/>}
    {celebrate && <CelebrateModal data={celebrate} onClose={closeCelebrate}/>}
    <Confetti fire={confetti}/>
    <Toast msg={toast}/>
  </React.Fragment>);
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch (e) {
  console.error('RENDER ERROR:', e);
  var __b = document.getElementById('boot'); if (__b) __b.style.display = 'none';
  document.getElementById('root').innerHTML =
    '<pre style="white-space:pre-wrap;word-break:break-word;padding:20px;font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;color:#b00020;background:#fff">RENDER ERROR:\n\n' +
    ((e && e.stack) ? e.stack : String(e)) + '</pre>';
}
</script>

<!-- Manual transform + run. Forces the classic JSX runtime so the output uses React.createElement
     and never emits an ES `import`. Everything is wrapped in try/catch so any failure is shown. -->
<script>
(function () {
  function fail(e) {
    console.error('RENDER ERROR:', e);
    var boot = document.getElementById('boot'); if (boot) boot.style.display = 'none';
    var root = document.getElementById('root');
    if (root) root.innerHTML =
      '<pre style="white-space:pre-wrap;word-break:break-word;padding:20px;' +
      'font:13px/1.5 ui-monospace,Menlo,Consolas,monospace;color:#b00020;background:#fff">' +
      'STARTUP ERROR:\n\n' + ((e && e.stack) ? e.stack : String(e)) + '</pre>';
  }
  try {
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined')
      throw new Error('React / ReactDOM не загрузились с CDN. Нужен интернет (unpkg.com).');
    if (typeof Babel === 'undefined')
      throw new Error('Babel не загрузился с CDN. Нужен интернет (unpkg.com).');
    var src = document.getElementById('appsource').textContent;
    var out = Babel.transform(src, {
      presets: [['react', { runtime: 'classic' }]],
      sourceType: 'script'
    }).code;
    (0, eval)(out);
  } catch (e) { fail(e); }
})();
</script>
